<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institut BBA - Gestion des Bilans Visuels</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-icon"><i data-lucide="activity" class="icon-lg"></i></div>
            <h1>Institut BBA</h1>
            <p class="header-sub">Gestion des Bilans Visuels</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('nouveau')">
                <i data-lucide="file-plus" class="icon-sm"></i>
                <span>Nouveau Bilan</span>
            </button>
            <button class="tab-btn" onclick="showTab('liste')">
                <i data-lucide="list" class="icon-sm"></i>
                <span>Liste des Bilans</span>
            </button>
        </div>

        <!-- ONGLET: NOUVEAU BILAN -->
        <div id="nouveau" class="tab-content active">
            <form id="bilanForm">

                <!-- REQUIRED FIELDS NOTICE -->
                <div class="required-notice">
                    <i data-lucide="info" class="icon-btn"></i>
                    <span>Les champs marques d'un <strong>*</strong> sont obligatoires</span>
                </div>

                <div class="section">
                    <h3>
                        <i data-lucide="eye" class="icon-section"></i>
                        <span class="section-title-bi">
                            <span>Bilan Visuel</span>
                        </span>
                    </h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Age *</label>
                            <input type="number" id="age" name="age" required min="0" max="150" placeholder="Ex: 25">
                        </div>
                        <div class="form-group">
                            <label>Sexe</label>
                            <select id="sexe" name="sexe">
                                <option value="">-- Selectionner --</option>
                                <option value="Homme">Homme</option>
                                <option value="Femme">Femme</option>
                            </select>
                        </div>
                        <div class="form-group full-width">
                            <label>Ametropie</label>
                            <div class="checkbox-grid">
                                <label class="checkbox-label"><input type="checkbox" name="ametropie" value="Myopie"><span>Myopie</span></label>
                                <label class="checkbox-label"><input type="checkbox" name="ametropie" value="Hyperm&eacute;tropie"><span>Hyperm&eacute;tropie</span></label>
                                <label class="checkbox-label"><input type="checkbox" name="ametropie" value="Astigmatisme"><span>Astigmatisme</span></label>
                            </div>
                        </div>
                        <div class="form-group full-width">
                            <label>Anomalies</label>
                            <div class="anomalies-groups">
                                <div class="anomalies-group">
                                    <p class="anomalies-group-title"><strong>Probl&egrave;mes d'accommodation :</strong></p>
                                    <div class="checkbox-grid">
                                        <label class="checkbox-label"><input type="checkbox" name="anomalies" value="Insuffisance d'accommodation"><span>Insuffisance d'accommodation</span></label>
                                        <label class="checkbox-label"><input type="checkbox" name="anomalies" value="Exc&egrave;s d'accommodation"><span>Exc&egrave;s d'accommodation</span></label>
                                        <label class="checkbox-label"><input type="checkbox" name="anomalies" value="Fatigue accommodative"><span>Fatigue accommodative</span></label>
                                        <label class="checkbox-label"><input type="checkbox" name="anomalies" value="Spasme accommodatif"><span>Spasme accommodatif</span></label>
                                        <label class="checkbox-label"><input type="checkbox" name="anomalies" value="Inertie accommodative"><span>Inertie accommodative</span></label>
                                        <label class="checkbox-label"><input type="checkbox" name="anomalies" value="Paralysie accommodative"><span>Paralysie accommodative</span></label>
                                    </div>
                                </div>

                                <div class="anomalies-group">
                                    <p class="anomalies-group-title"><strong>Probl&egrave;mes de convergence :</strong></p>
                                    <div class="checkbox-grid">
                                        <label class="checkbox-label"><input type="checkbox" name="anomalies" value="Insuffisance de convergence"><span>Insuffisance de convergence</span></label>
                                        <label class="checkbox-label"><input type="checkbox" name="anomalies" value="Pseudo-insuffisance de convergence"><span>Pseudo-insuffisance de convergence</span></label>
                                        <label class="checkbox-label"><input type="checkbox" name="anomalies" value="Exc&egrave;s de convergence"><span>Exc&egrave;s de convergence</span></label>
                                        <label class="checkbox-label"><input type="checkbox" name="anomalies" value="Insuffisance de convergence pure"><span>Insuffisance de convergence pure</span></label>
                                    </div>
                                </div>

                                <div class="anomalies-group">
                                    <p class="anomalies-group-title"><strong>&Eacute;sophorie :</strong></p>
                                    <div class="checkbox-grid">
                                        <label class="checkbox-label"><input type="checkbox" name="anomalies" value="&Eacute;sophorie basique"><span>&Eacute;sophorie basique</span></label>
                                        <label class="checkbox-label"><input type="checkbox" name="anomalies" value="Insuffisance de divergence"><span>Insuffisance de divergence</span></label>
                                        <label class="checkbox-label"><input type="checkbox" name="anomalies" value="Exc&egrave;s de convergence"><span>Exc&egrave;s de convergence</span></label>
                                    </div>
                                </div>

                                <div class="anomalies-group">
                                    <p class="anomalies-group-title"><strong>Exophorie :</strong></p>
                                    <div class="checkbox-grid">
                                        <label class="checkbox-label"><input type="checkbox" name="anomalies" value="Exophorie basique"><span>Exophorie basique</span></label>
                                        <label class="checkbox-label"><input type="checkbox" name="anomalies" value="Exc&egrave;s de divergence"><span>Exc&egrave;s de divergence</span></label>
                                        <label class="checkbox-label"><input type="checkbox" name="anomalies" value="Insuffisance de convergence"><span>Insuffisance de convergence</span></label>
                                    </div>
                                </div>

                                <div class="anomalies-group">
                                    <p class="anomalies-group-title"><strong>Autres :</strong></p>
                                    <div class="checkbox-grid">
                                        <label class="checkbox-label"><input type="checkbox" name="anomalies" value="Phorie verticale hyper D/G"><span>Phorie verticale hyper D/G</span></label>
                                        <label class="checkbox-label"><input type="checkbox" name="anomalies" value="Phorie verticale hyper G/D"><span>Phorie verticale hyper G/D</span></label>
                                        <label class="checkbox-label"><input type="checkbox" name="anomalies" value="Paralysie oculomotrice"><span>Paralysie oculomotrice</span></label>
                                        <label class="checkbox-label"><input type="checkbox" name="anomalies" value="Dysfonctionnement vergentiel"><span>Dysfonctionnement vergentiel</span></label>
                                        <label class="checkbox-label"><input type="checkbox" name="anomalies" value="R&eacute;serves fusionnelles r&eacute;duites"><span>R&eacute;serves fusionnelles r&eacute;duites</span></label>
                                        <label class="checkbox-label"><input type="checkbox" name="anomalies" value="Pas d'anomalie"><span>Pas d'anomalie</span></label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Acuite Visuelle</label>
                            <select id="acuite_visuelle" name="acuite_visuelle">
                                <option value="">-- Selectionner --</option>
                                <option value="20/10">20/10</option>
                                <option value="15/10">15/10</option>
                                <option value="12/10">12/10</option>
                                <option value="10/10">10/10</option>
                                <option value="9/10">9/10</option>
                                <option value="8/10">8/10</option>
                                <option value="7/10">7/10</option>
                                <option value="6/10">6/10</option>
                                <option value="5/10">5/10</option>
                                <option value="4/10">4/10</option>
                                <option value="3/10">3/10</option>
                                <option value="2/10">2/10</option>
                                <option value="1/10">1/10</option>
                                <option value="< 1/10">< 1/10</option>
                            </select>
                        </div>
                    </div>

                    <div class="step-nav">
                        <button type="reset" class="btn btn-secondary" onclick="resetForm()">
                            <i data-lucide="rotate-ccw" class="icon-btn"></i> Reinitialiser
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i data-lucide="save" class="icon-btn"></i> Enregistrer le Bilan
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <!-- ONGLET: LISTE DES BILANS -->
        <div id="liste" class="tab-content">
            <div class="section">
                <div class="toolbar">
                    <h3><i data-lucide="folder-open" class="icon-section"></i> Liste des Bilans</h3>
                    <div class="toolbar-actions">
                        <button onclick="loadBilans()" class="btn btn-secondary">
                            <i data-lucide="refresh-cw" class="icon-btn"></i> Actualiser
                        </button>
                        <button onclick="exportCSV()" class="btn btn-primary">
                            <i data-lucide="download" class="icon-btn"></i> Exporter CSV
                        </button>
                    </div>
                </div>

                <div class="filters">
                    <select id="filterSexe" onchange="filterBilans()">
                        <option value="">Tous les sexes</option>
                        <option value="Homme">Homme</option>
                        <option value="Femme">Femme</option>
                    </select>
                    <input type="date" id="filterDateDebut" onchange="filterBilans()">
                    <input type="date" id="filterDateFin" onchange="filterBilans()">
                </div>

                <div id="bilansList" class="bilans-list">
                    <p class="loading">Chargement...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DETAILS BILAN -->
    <div id="bilanModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3><i data-lucide="file-text" class="icon-section"></i> Details du Bilan</h3>
                <button class="modal-close" onclick="document.getElementById('bilanModal').classList.remove('show')">
                    <i data-lucide="x" class="icon-btn"></i>
                </button>
            </div>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script src="js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
